appId: com.devdock.app
productName: DevDock
executableName: devdock
icon: resources/icon.png
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierrc.*}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - node_modules/node-pty/**
linux:
  target:
    - AppImage
    - deb
    - snap
  maintainer: devdock
  category: Development
  synopsis: "Manage local dev environments with ease"
  desktop:
    Name: DevDock
    Categories: Development;IDE;
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
