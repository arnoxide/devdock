appId: com.devdock.app
publish:
  provider: github
  owner: arnoxide
  repo: devdock
productName: DevDock
executableName: devdock
icon: resources/icon.png
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierrc.*}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - node_modules/node-pty/**
linux:
  target:
    - AppImage
    - deb
    - snap
  icon: resources/icons
  maintainer: devdock
  category: Development
  synopsis: "Manage local dev environments with ease"
  desktop:
    Name: DevDock
    Categories: Development;IDE;
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  icon: resources/icon_1024.png
dmg:
  artifactName: "DevDock-Installer-${version}.${ext}"
  icon: resources/icon_1024.png
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
  publisherName: "DevDock"
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "DevDock"
portable:
  artifactName: "DevDock-Portable-${version}.${ext}"
